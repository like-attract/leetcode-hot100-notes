<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description | escape }}">
    <title>{{ page.title | default: site.title | escape }}{% if site.description %} | {{ site.description | escape }}{% endif %}</title>
    <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
    {%- include custom-head.html -%}
  </head>
  <body>
    <header class="site-header" role="banner">
      <div class="wrapper site-header-inner">
        <a class="site-title" rel="author" href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>
        <nav class="topic-nav" aria-label="主要导航">
          <a href="{{ '/' | relative_url }}">专题首页</a>
          <a href="https://github.com/like-attract/leetcode-hot100-notes">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrapper">
        <p>{{ site.description | escape }}</p>
      </div>
    </footer>
  </body>
</html>
